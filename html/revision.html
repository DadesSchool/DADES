    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f8;
        }

        /* ===== Header ===== */
        header {
            background: #28a745;
            padding: 15px;
            color: white;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        /* ===== Title ===== */
        h1 {
            text-align: center;
            margin: 30px 0;
            color: #28a745;
        }

        /* ===== Buttons grid ===== */
        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .button-container button {
            border: none;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .button-container button:hover {
            transform: translateY(-5px);
        }

        .button-container img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* ===== 2026 Card ===== */
        .bottom-center {
            display: flex;
            justify-content: center;
            margin: 50px 0;
        }

        .btn-2026 {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 20px;
            width: 280px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: all 0.35s ease;
            color: white;
            text-align: center;
        }

        .btn-2026:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 18px 35px rgba(0,0,0,0.35);
        }

        .btn-2026 img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .btn-2026 .text {
            padding: 15px;
            font-size: 1.05em;
            font-weight: bold;
        }

        .btn-2026:active {
            transform: scale(0.97);
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 20px;
            background: #28a745;
            color: white;
            margin-top: 40px;
        }

        /* ===== Responsive ===== */
        @media (max-width:600px) {
            .btn-2026 {
                width: 90%;
            }
        }
    </style>
</head>
